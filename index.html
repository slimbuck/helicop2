<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Helicopo - WebGPU Voxel Game</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #1a1a2e;
      touch-action: none;
    }
    
    #app {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    
    canvas {
      display: block;
      flex: 1;
      max-width: 100%;
      image-rendering: pixelated;
    }
    
    #error {
      color: #ff6b6b;
      font-family: system-ui, sans-serif;
      text-align: center;
      padding: 2rem;
      max-width: 600px;
    }
    
    #error h1 {
      margin-bottom: 1rem;
    }
    
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: white;
      font-family: monospace;
      font-size: 14px;
      pointer-events: none;
      text-shadow: 1px 1px 2px black;
    }
    
    #controls {
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
      color: rgba(255,255,255,0.6);
      font-family: system-ui, sans-serif;
      font-size: 12px;
      text-align: center;
      pointer-events: none;
    }
    
    #toolbar {
      display: flex;
      gap: 8px;
      padding: 8px 16px;
      background: rgba(0,0,0,0.7);
      width: 100%;
    }
    
    #toolbar button {
      padding: 6px 16px;
      font-family: monospace;
      font-size: 14px;
      background: #444;
      color: #fff;
      border: 1px solid #666;
      border-radius: 3px;
      cursor: pointer;
    }
    
    #toolbar button:hover {
      background: #555;
    }
    
    #toolbar button.active {
      background: #2a6;
      border-color: #3b7;
    }
    
    #toolbar .fps {
      font-family: monospace;
      font-size: 14px;
      color: #aaa;
      padding: 6px 12px;
      margin-left: auto;
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="toolbar">
      <button id="btn-physics">Physics</button>
      <span id="toolbar-fps" class="fps">FPS: --</span>
    </div>
    <canvas id="canvas"></canvas>
    <div id="error" style="display: none;">
      <h1>WebGPU Not Supported</h1>
      <p>This game requires WebGPU which is not available in your browser. 
         Please use Chrome 113+, Edge 113+, or another WebGPU-enabled browser.</p>
    </div>
  </div>
  <div id="ui">
    <div id="fps"></div>
    <div id="status"></div>
  </div>
  <div id="controls">
    <span class="desktop">Arrow Keys / WASD to tilt | SPACE to thrust</span>
    <span class="mobile">Tilt device to steer | Touch to thrust</span>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
